<!DOCTYPE html>
<html>
<head>
    <title>Decision Tree Regression Prediction</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        form {
            width: 500px; /* Adjust width as needed */
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 20px;
        }
        button{
            margin-bottom: 20px;
        }
        .form-group label {
            display: inline-block;
            width: 100px; /* Adjust label width as needed */
            text-align: right;
            margin-right: 10px;
        }
        .form-group select {
            width: 200px; /* Adjust input width as needed */
        }
    </style>
</head>

<body>
    <form id="predictionForm">
        <center>
            <h2>Decision Tree Regression Prediction</h2>

            <div class="form-group">
                <label for="variable1">Outlook :</label>
                <select id="variable1">
                    <option value=1>Rainy</option>
                    <option value=0>Overcast</option>
                    <option value=2>Sunny</option>
                </select>
            </div>

            <div class="form-group">
                <label for="variable2">Temp :</label>
                <select id="variable2">
                    <option value=1>Hot</option>
                    <option value=2>Mild</option>
                    <option value=0>Cool</option>
                </select>
            </div>

            <div class="form-group">
                <label for="variable3">Humidity :</label>
                <select id="variable3">
                    <option value=0>High</option>
                    <option value=1>Normal</option>
                </select>
            </div>

            <div class="form-group">
                <label for="variable4">Windy :</label>
                <select id="variable4">
                    <option value=0>False</option>
                    <option value=1>True</option>
                </select>
            </div>
        
            <button type="button" onclick="predict()">Predict</button>

            <div id="predictionResult"></div>
        </center>
    </form>

    <script>
        function predict() {
            var variable1 = parseFloat(document.getElementById("variable1").value);
            var variable2 = parseFloat(document.getElementById("variable2").value);
            var variable3 = parseFloat(document.getElementById("variable3").value);
            var variable4 = parseFloat(document.getElementById("variable4").value);

            // Check if any field is empty
            if (isNaN(variable1) || isNaN(variable2) || isNaN(variable3) || isNaN(variable4)) {
                alert("Please select values for all variables.");
                return;
            }

            // Prepare form data
            var formData = new FormData();
            formData.append('variable1', variable1);
            formData.append('variable2', variable2);
            formData.append('variable3', variable3);
            formData.append('variable4', variable4);

            // Send POST request to Flask endpoint
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Display prediction result
                document.getElementById('predictionResult').innerHTML = 'Prediction: ' + data.prediction;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while predicting. Please try again.');
            });
        }

    </script>
</body>
</html>
