<!DOCTYPE html>
<html>
<head>
    <title>Logistic Regression Prediction</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        form {
            width: 500px; /* Adjust width as needed */
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 20px;
        }
        button{
            margin-bottom: 20px;
        }
        .form-group label {
            display: inline-block;
            width: 100px; /* Adjust label width as needed */
            text-align: right;
            margin-right: 10px;
        }
        .form-group input {
            width: 200px; /* Adjust input width as needed */
        }
    </style>
</head>

<body>
    <form id="predictionForm">
        <center>
        <h2>Logistic Regression Prediction</h2>

        <div class="form-group">
            <label for="variable1">Age :</label>
            <input type="number" id="variable1" name="variable1">
        </div>
        <button type="button" onclick="predict()">Predict</button>

        <div id="predictionResult"></div>
    </center>
    </form>

    <script>
        function predict() {
            var variable1 = parseFloat(document.getElementById("variable1").value);

            // Check if any field is empty
            if (isNaN(variable1)) {
                alert("Please enter values for all variables.");
                return;
            }

            // Prepare form data
            var formData = new FormData();
            formData.append('variable1', variable1);

            // Send POST request to Flask endpoint
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Debugging: Print the received data
                console.log('Received data:', data);

                // Display prediction result
                var prediction = data.prediction;
                console.log('Prediction:', prediction); // Debugging: Print the prediction value
                document.getElementById('predictionResult').innerHTML = 'Prediction: ' + prediction;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while predicting. Please try again.');
            });
        }

    </script>
</body>
</html>
